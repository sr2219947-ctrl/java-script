<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroInsight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>
  <div class="shooting-stars"></div>

  <div class="container">

    <!-- FORM SECTION -->
    <section class="form-section" id="formSection">
      <div class="brand">
        <div class="brand-orb">✦</div>
        <h1>AstroInsight</h1>
        <p class="brand-tagline">Your personalised cosmic reading awaits</p>
      </div>

      <div class="form-card">
        <div class="form-row">
          <div class="field">
            <label for="name">First Name</label>
            <input type="text" id="name" placeholder="Aarav" autocomplete="off" />
          </div>
          <div class="field">
            <label for="surname">Last Name</label>
            <input type="text" id="surname" placeholder="Sharma" autocomplete="off" />
          </div>
        </div>

        <div class="field">
          <label>Date of Birth</label>
          <div class="dob-row">
            <div class="dob-field">
              <input type="number" id="day" placeholder="DD" min="1" max="31" />
              <span class="dob-label">Day</span>
            </div>
            <div class="dob-field">
              <input type="number" id="month" placeholder="MM" min="1" max="12" />
              <span class="dob-label">Month</span>
            </div>
            <div class="dob-field">
              <input type="number" id="year" placeholder="YYYY" min="1900" max="2025" />
              <span class="dob-label">Year</span>
            </div>
          </div>
        </div>

        <p class="err-msg" id="errMsg"></p>

        <button class="submit-btn" id="submitBtn">
          <span>Reveal My Reading</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </section>

    <!-- RESULT SECTION -->
    <section class="result-section hidden" id="resultSection">

      <div class="result-hero">
        <div class="zodiac-symbol" id="zodiacSymbol"></div>
        <h2 id="greetingName"></h2>
        <div class="zodiac-name" id="zodiacName"></div>
        <p class="zodiac-dates" id="zodiacDates"></p>
      </div>

      <div class="result-grid" id="resultGrid">
        <!-- Filled by JS -->
      </div>

      <button class="reset-btn" id="resetBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8A5 5 0 1 1 3.5 4.5M3 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>New Reading</span>
      </button>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
