<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Bmi.css">
</head>
<body>
    <div>
        <h2>BMI Calculator</h2>
        <input type="number" id="weight" placeholder="Enter weight (kg)">
        <input type="number" id="height" placeholder="Enter height">
        <!--Select Unit-->
         <select id="unit">
            <option value="cm">Height in CM</option>
            <option value="m">Height in CM</option>
            <option value="ft">Height in FT & INCH</option>
         </select>
        <button>Calculate BMI</button>
        <p id="result">Your Bmi will appear here : </p>
    </div>
    <script src="Bmi.js"></script>
</body>
</html>
