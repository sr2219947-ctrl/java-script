<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Olympic Countdown</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1 id="title">Countdown to Olympic 2028</h1>

    <div class="container">

        <div class="box">
            <h2 id="days">0</h2>
            <p>Days</p>
        </div>

        <div class="box">
            <h2 id="hours">0</h2>
            <p>Hours</p>
        </div>

        <div class="box">
            <h2 id="minutes">0</h2>
            <p>Minutes</p>
        </div>

        <div class="box">
            <h2 id="seconds">0</h2>
            <p>Seconds</p>
        </div>

    </div>

    <h2 id="message"></h2>

    <script src="./timer.js"></script>

</body>

</html>
